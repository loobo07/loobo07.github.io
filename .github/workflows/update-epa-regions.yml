name: Update EPA Level III region data

# ── Triggers ──────────────────────────────────────────────────────────────────
#
#  Schedule: Runs daily at 10:00 UTC (05:00 EST / 06:00 EDT).
#            EPA boundary data is stable; most runs will be no-ops.
#            When data does change, the commit triggers a GitHub Pages redeploy.
#
#  Manual:   Actions → "Update EPA Level III region data" → Run workflow
#            Optional: set `dry_run: true` to fetch + test without committing.
#
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — fetch and test but do not commit'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 10 * * *'   # daily at 10:00 UTC (05:00 EST)

permissions:
  contents: write   # push directly to master to trigger GitHub Pages redeploy

jobs:
  update-regions:
    name: Fetch EPA data → regenerate regions.geojson → deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can diff the data file

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. GDAL (ogr2ogr — shapefile → GeoJSON conversion) ───────────────────
      - name: Install GDAL
        run: sudo apt-get install -y --no-install-recommends gdal-bin

      # ── 4. Download + convert EPA Level III ecoregion shapefile ──────────────
      #
      #  Option B — HTTPS zip download (more reliable than ArcGIS REST pagination)
      #  Source: https://gaftp.epa.gov/EPADataCommons/ORD/Ecoregions/us/
      #  Fallback (ArcGIS REST): node scripts/fetch-epa-ecoregions.js /tmp/us_eco_l3.geojson
      #
      - name: Download EPA ecoregion shapefile and convert to GeoJSON
        run: |
          set -e

          # Try zip downloads first (multiple URLs), fall back to ArcGIS REST
          # NOTE: gaftp.epa.gov may be blocked from some runners — S3 is more reliable
          URLS=(
            "https://dmap-prod-oms-edc.s3.us-east-1.amazonaws.com/ORD/Ecoregions/us/us_eco_l3_state.zip"
            "https://dmap-prod-oms-edc.s3.us-east-1.amazonaws.com/ORD/Ecoregions/us/us_eco_l3.zip"
            "https://gaftp.epa.gov/EPADataCommons/ORD/Ecoregions/us/us_eco_l3_state.zip"
            "https://gaftp.epa.gov/EPADataCommons/ORD/Ecoregions/us/us_eco_l3.zip"
          )

          DOWNLOADED=false
          for URL in "${URLS[@]}"; do
            echo "  Trying: $URL"
            if curl -sL --fail --connect-timeout 20 --max-time 180 "$URL" -o /tmp/us_eco_l3.zip 2>/dev/null; then
              echo "  Downloaded from: $URL"
              DOWNLOADED=true
              break
            fi
          done

          if [ "$DOWNLOADED" = "true" ]; then
            echo "  Unzipping..."
            unzip -q /tmp/us_eco_l3.zip -d /tmp/us_eco_l3_shp/
            SHP=$(find /tmp/us_eco_l3_shp/ -name "*.shp" | head -1)
            echo "  Found shapefile: $SHP"
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 -simplify 0.05 /tmp/us_eco_l3.geojson "$SHP" \
                    -select US_L3CODE,US_L3NAME
          else
            echo "  All zip URLs failed — using ArcGIS REST fallback (layer 11 = polygons)..."
            node scripts/fetch-epa-ecoregions.js /tmp/us_eco_l3.geojson
          fi

          # NOTE: require() does not support .geojson extension — use JSON.parse + readFileSync
          FEAT=$(node -e "const fs=require('fs'); const f=JSON.parse(fs.readFileSync('/tmp/us_eco_l3.geojson','utf8')); console.log(f.features.length)")
          if [ "$FEAT" -eq 0 ]; then
            echo "ERROR: 0 features fetched — all sources failed"
            exit 1
          fi
          echo "  ${FEAT} EPA features ready"
          echo "EPA_FEATURES=${FEAT}" >> "$GITHUB_ENV"

      # ── 5. Extract → data/regions.geojson ────────────────────────────────────
      - name: Extract Ridge to Coast regions from EPA data
        run: |
          node scripts/extract-regions.js /tmp/us_eco_l3.geojson data/regions.geojson 2>&1 | tee /tmp/extract.log
          FEAT=$(node -e "const fs=require('fs'); const f=JSON.parse(fs.readFileSync('./data/regions.geojson','utf8')); console.log(f.features.length)")
          SIZE=$(du -k data/regions.geojson | cut -f1)
          echo "Output: ${FEAT} features, ${SIZE} KB"
          echo "REGION_FEATURES=${FEAT}" >> "$GITHUB_ENV"
          echo "REGION_SIZE_KB=${SIZE}"  >> "$GITHUB_ENV"
          # Fail if file is suspiciously large (> 2 MB = 2048 KB)
          if [ "$SIZE" -gt 2048 ]; then
            echo "ERROR: regions.geojson is ${SIZE} KB — exceeds 2 MB limit"
            exit 1
          fi

      # ── 6. Verify all 9 region keys are present ───────────────────────────────
      - name: Verify all 9 region keys are present
        run: |
          node -e "
            const gj = JSON.parse(require('fs').readFileSync('./data/regions.geojson','utf8'));
            const keys = [...new Set(gj.features.map(f => f.properties.region))].sort();
            const required = [
              'blueRidge','coastal','greatLakes','gulfCoastal',
              'interiorLowlands','neCoastal','neUpland','piedmont','valleyRidge'
            ];
            const missing = required.filter(k => !keys.includes(k));
            if (missing.length) {
              console.error('Missing region keys:', missing.join(', '));
              process.exit(1);
            }
            console.log('All 9 region keys present:', keys.join(', '));
            required.forEach(k => {
              const count = gj.features.filter(f => f.properties.region === k).length;
              console.log(' ', k, '—', count, 'features');
            });
          "

      # ── 7. Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests (308 tests / 37 suites)
        run: node --test tests/geo.test.js

      # ── 8. Check whether data/regions.geojson actually changed ───────────────
      - name: Check for data changes
        id: diff
        run: |
          if git diff --quiet data/regions.geojson; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to data/regions.geojson — EPA data is unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            ADDED=$(git diff --numstat data/regions.geojson | awk '{print $1}')
            REMOVED=$(git diff --numstat data/regions.geojson | awk '{print $2}')
            echo "changes=+${ADDED}/-${REMOVED} lines" >> "$GITHUB_OUTPUT"
            echo "data/regions.geojson changed: +${ADDED}/-${REMOVED} lines"
          fi

      # ── 9. Commit directly to master → triggers GitHub Pages redeploy ─────────
      - name: Commit and push to master
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regions.geojson
          git commit -m "data: update regions.geojson from EPA Level III ecoregions ($(date +%Y-%m-%d))

          Source: EPA HTTPS zip — gaftp.epa.gov/EPADataCommons/ORD/Ecoregions/us/
          EPA features fetched: ${{ env.EPA_FEATURES }}
          Ridge to Coast features: ${{ env.REGION_FEATURES }}
          File size: ${{ env.REGION_SIZE_KB }} KB

          Automated daily update via .github/workflows/update-epa-regions.yml"
          git push origin master

      # ── 10. Workflow summary ──────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## EPA Region Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| EPA features fetched | ${EPA_FEATURES:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ridge to Coast features | ${REGION_FEATURES:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| File size | ${REGION_SIZE_KB:-n/a} KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Data changed | ${{ steps.diff.outputs.changed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"
