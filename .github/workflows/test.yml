name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Minimal permissions — this workflow only reads code and uploads artifacts.
# It never writes to the repo or calls the GitHub API.
permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Test against the minimum supported version and current LTS
        node-version: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run unit tests
        # --test-reporter=tap writes TAP to stdout; redirect to file as well.
        # Exit code is non-zero on any failure, which fails the workflow step.
        run: |
          mkdir -p tests/results
          node --test \
               --test-reporter=tap \
               --test-reporter-destination=tests/results/ci-${{ matrix.node-version }}.txt \
               --test-reporter=spec \
               --test-reporter-destination=stdout \
               tests/geo.test.js

      - name: Upload test results
        # Always upload so results are available even when tests fail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node${{ matrix.node-version }}
          path: tests/results/ci-${{ matrix.node-version }}.txt
          retention-days: 30
