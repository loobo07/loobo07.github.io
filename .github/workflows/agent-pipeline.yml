name: Multi-Agent Pipeline

# Triggered when an issue is labeled with agent:*
# CURRENT STATUS: Stub — Bedrock integration pending
#
# To activate this pipeline:
# 1. AWS Console → Bedrock → request model access for:
#    - anthropic.claude-haiku-4-5-20251001
#    - anthropic.claude-sonnet-4-6-20251001
#    - anthropic.claude-opus-4-7-20251101
#    (all in us-east-1)
#
# 2. Create IAM role with bedrock:InvokeModel permission,
#    trust policy for GitHub OIDC:
#    token.actions.githubusercontent.com → repo:loobo07/loobo07.github.io:*
#
# 3. Add AWS_ROLE_ARN to this repo's GitHub variables:
#    Settings → Secrets and variables → Actions → Variables
#
# 4. Replace the stub steps below with real Claude Code invocations:
#    - uses: aws-actions/configure-aws-credentials@v4
#      with:
#        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
#        aws-region: us-east-1
#    - run: claude --model <model> --bedrock --system-prompt .claude/agents/<role>.md "<issue body>"
#
# Cost estimate per full feature PR (plan + architect + implement):
#   Haiku planner:    ~10K tokens = ~$0.003
#   Opus architect:   ~50K tokens = ~$0.75
#   Sonnet engineer:  ~80K tokens = ~$0.24
#   Total:            ~$1.00 per feature

on:
  issues:
    types: [labeled]

jobs:
  # ──────────────────────────────────────────────
  # PLANNER — Haiku (cheap, fast)
  # Triggered by: agent:plan label
  # ──────────────────────────────────────────────
  plan:
    if: github.event.label.name == 'agent:plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bedrock integration pending
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Multi-agent pipeline: Bedrock not yet configured"
          echo ""
          echo "To run the Planner locally:"
          echo "  git worktree add ../ridge-issue-${{ github.event.issue.number }} -b claude/issue-${{ github.event.issue.number }}-plan"
          echo "  cd ../ridge-issue-${{ github.event.issue.number }}"
          echo "  claude  # use Haiku model, reference .claude/agents/planner.md"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "See CLAUDE.md → Bedrock Integration Roadmap to activate automation."

  # ──────────────────────────────────────────────
  # ARCHITECT — Opus 4.7 (best reasoning)
  # Triggered by: agent:architect label
  # ──────────────────────────────────────────────
  architect:
    if: github.event.label.name == 'agent:architect'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bedrock integration pending
        run: |
          echo "Architect pipeline pending Bedrock setup."
          echo "Run locally: claude (Opus model, .claude/agents/architect.md)"

  # ──────────────────────────────────────────────
  # ENGINEER — Sonnet (standard) or Opus (hard)
  # Triggered by: agent:implement or agent:implement-hard label
  # ──────────────────────────────────────────────
  implement:
    if: |
      github.event.label.name == 'agent:implement' ||
      github.event.label.name == 'agent:implement-hard' ||
      github.event.label.name == 'agent:design'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bedrock integration pending
        run: |
          echo "Engineer pipeline pending Bedrock setup."
          echo "Run locally: claude (Sonnet or Opus model, .claude/agents/engineer.md)"
