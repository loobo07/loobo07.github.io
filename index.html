<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

  <!-- Content Security Policy
       Leaflet is now vendored in lib/ so script-src requires only 'self' — no CDN domain needed.
       'unsafe-inline' is required in style-src because Leaflet sets inline style attributes
       via JavaScript for tile and marker positioning. Scripts are locked to 'self' only.
       Tile images are loaded from CARTO (img-src). No XHR/fetch calls are made (connect-src omitted).
       GitHub Pages cannot set HTTP headers so this meta tag is the available CSP mechanism.
       Note: frame-ancestors is ignored in meta CSP by all browsers (HTTP header only).

       Vendored Leaflet 1.9.4 SHA-256 hashes (for audit — files served from self, no integrity= needed):
         lib/leaflet.js:  sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=
         lib/leaflet.css: sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://*.basemaps.cartocdn.com data: blob:; base-uri 'self'; form-action 'none';">

  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <title>Richmond Fall Line Map</title>
  <meta name="description" content="Interactive map of Richmond, VA showing the Atlantic Seaboard Fall Line separating the Coastal Plain and Piedmont regions.">

  <!-- Leaflet 1.9.4 — vendored locally, no CDN dependency -->
  <link rel="stylesheet" href="lib/leaflet.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1>Richmond Fall Line</h1>
    <p class="subtitle">Coastal Plain &amp; Piedmont regions</p>
  </header>

  <div id="map" role="region" aria-label="Interactive map of Richmond, VA fall line"></div>

  <div id="legend" aria-label="Map legend">
    <h2>Legend</h2>
    <div class="legend-item">
      <span class="swatch coastal"></span>
      <span>Coastal Plain (Tidewater)</span>
    </div>
    <div class="legend-item">
      <span class="swatch piedmont"></span>
      <span>Piedmont</span>
    </div>
    <div class="legend-item">
      <span class="swatch fallline"></span>
      <span>Fall Line <em>(approximate)</em></span>
    </div>
    <hr>
    <div class="layer-toggles">
      <label class="toggle">
        <input type="checkbox" id="toggle-regions" checked>
        Region shading
      </label>
      <label class="toggle">
        <input type="checkbox" id="toggle-fallline" checked>
        Fall line
      </label>
    </div>
    <p class="attribution-note">
      &copy; <a href="https://www.openstreetmap.org/copyright" rel="noopener noreferrer" target="_blank">OpenStreetMap</a>
      contributors &copy; <a href="https://carto.com/attributions" rel="noopener noreferrer" target="_blank">CARTO</a>
    </p>
  </div>

  <!-- Leaflet 1.9.4 — vendored locally, no CDN dependency -->
  <script src="lib/leaflet.js"></script>

  <!-- Pure geographic data — no DOM or Leaflet dependency; also used by unit tests -->
  <script src="lib/geo-data.js"></script>

  <script src="map.js"></script>
</body>
</html>
