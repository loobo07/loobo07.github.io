<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

  <!-- Content Security Policy
       Leaflet is vendored in lib/ so script-src requires only 'self' — no CDN domain needed.
       'unsafe-inline' is required in style-src because Leaflet sets inline style attributes
       via JavaScript for tile and marker positioning. Scripts are fully locked to 'self' only.
       Tile images load from CARTO (img-src). connect-src 'self' allows fetch() of same-origin
       data/hardiness.geojson for the plant hardiness layer.
       GitHub Pages cannot set HTTP headers so this meta tag is the available CSP mechanism.
       Note: frame-ancestors is ignored in meta CSP by all browsers (HTTP header only).

       Browser extensions that inject Google Fonts (e.g. Poppins from fonts.gstatic.com) will
       show a CSP blocked-resource warning in DevTools — this is expected and correct behaviour.
       Our page does not load Google Fonts; the CSP is working as intended by blocking them.

       Vendored Leaflet 1.9.4 SHA-256 hashes (for audit — files served from self, no integrity= needed):
         lib/leaflet.js:  sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=
         lib/leaflet.css: sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://*.basemaps.cartocdn.com data: blob:; connect-src 'self' https://nominatim.openstreetmap.org; base-uri 'self'; form-action 'none';">

  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <title>Fall Line to Coast</title>
  <meta name="description" content="Interactive map of the Atlantic Seaboard Fall Line corridor — Washington DC, Richmond VA, and Raleigh NC — showing Coastal Plain and Piedmont regions and USDA Plant Hardiness Zones.">

  <!-- Leaflet 1.9.4 — vendored locally, no CDN dependency -->
  <link rel="stylesheet" href="lib/leaflet.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1>Fall Line to Coast</h1>
    <p class="subtitle">DC &middot; Richmond &middot; Raleigh</p>
  </header>

  <div id="map" role="region" aria-label="Interactive map of the Atlantic Seaboard Fall Line from Washington DC through Richmond VA to Raleigh NC"></div>

  <div id="legend" aria-label="Map legend">
    <div class="legend-header">
      <h2>Legend</h2>
      <button id="legend-toggle" aria-label="Toggle legend" aria-expanded="true">&#x25BE;</button>
    </div>
    <div id="legend-body">
      <div class="legend-item">
        <span class="swatch coastal"></span>
        <span>Coastal Plain (Tidewater)</span>
      </div>
      <div class="legend-item">
        <span class="swatch piedmont"></span>
        <span>Piedmont</span>
      </div>
      <div class="legend-item">
        <span class="swatch fallline"></span>
        <span>Fall Line <em>(approximate)</em></span>
      </div>

      <!-- Hardiness zone swatches — shown only when the layer is active -->
      <div id="hardiness-legend" class="hardiness-legend" hidden>
        <div class="legend-section-label">Hardiness Zones</div>
        <div class="zone-swatches"></div>
      </div>

      <hr>
      <div class="layer-toggles">
        <label class="toggle">
          <input type="checkbox" id="toggle-regions" checked>
          Region shading
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-fallline" checked>
          Fall line
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-hardiness">
          <span id="hardiness-toggle-label">
            Hardiness zones
            <span class="loading-spinner" id="hardiness-spinner" hidden aria-hidden="true"></span>
          </span>
        </label>
        <p id="hardiness-error" class="hardiness-error" hidden></p>
      </div>
      <p class="attribution-note">
        &copy; <a href="https://www.openstreetmap.org/copyright" rel="noopener noreferrer" target="_blank">OpenStreetMap</a>
        contributors &copy; <a href="https://carto.com/attributions" rel="noopener noreferrer" target="_blank">CARTO</a>
        &middot; <a href="https://planthardiness.ars.usda.gov" rel="noopener noreferrer" target="_blank">USDA PHZM</a>
      </p>
    </div>
  </div>

  <div id="search-bar" aria-label="Location search">
    <form id="search-form" role="search">
      <input type="search" id="search-input" placeholder="Zip code or city&#x2026;"
             maxlength="100" autocomplete="off" aria-label="Enter zip code or city">
      <button type="button" id="locate-btn" aria-label="Use my location">&#x1F4CD;</button>
      <button type="submit" aria-label="Search">&#x2192;</button>
    </form>
    <p id="search-status" class="search-status" hidden aria-live="polite"></p>
  </div>

  <!-- Leaflet 1.9.4 — vendored locally, no CDN dependency -->
  <script src="lib/leaflet.js"></script>

  <!-- Pure geographic data — no DOM or Leaflet dependency; also used by unit tests -->
  <script src="lib/geo-data.js"></script>

  <script src="map.js"></script>
</body>
</html>
